name: Build and Deploy to ConoHa WING

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy data and images into the build output
        run: |
          cp -r data dist/data
          cp -r images dist/images

      - name: prepare ssh key
        run: |
          mkdir -p .ssh
          echo "${{ secrets.WING_SSH_KEY }}" > .ssh/id_rsa
          chmod 600 .ssh/id_rsa

      - name: deploy with rsync
        run: |
          rsync -rlptgoD -O --delete \
            -e "ssh -i .ssh/id_rsa -o StrictHostKeyChecking=no -p ${{ secrets.WING_SSH_PORT }}" \
            ./dist/ ${{ secrets.WING_SSH_USER }}@${{ secrets.WING_SSH_HOST }}:~/public_html/conotavi.com/
