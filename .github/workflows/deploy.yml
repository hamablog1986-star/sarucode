name: Deploy to ConoHa WING

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: prepare ssh key
        run: |
          mkdir -p .ssh
          echo "${{ secrets.WING_SSH_KEY }}" > .ssh/id_rsa
          chmod 600 .ssh/id_rsa

      - name: deploy with rsync
        run: |
          rsync -rlptgoD -O --delete \
            --exclude ".git/" --exclude ".github/" --exclude ".ssh/" \
            -e "ssh -i .ssh/id_rsa -o StrictHostKeyChecking=no -p ${{ secrets.WING_SSH_PORT }}" \
            ./ ${{ secrets.WING_SSH_USER }}@${{ secrets.WING_SSH_HOST }}:~/public_html/conotavi.com/
